      case 0x6F: { const lo=this._pop(),hi=this._pop(); this.PC=(hi<<8)|lo; cy=5; break; } // RET
      case 0x7F: { const lo=this._pop(),hi=this._pop(); this.PC=(hi<<8)|lo; this._setP(this._pop()); cy=6; break; } // RETI

      // ── TCALL (table call $FFxx) ──────────────────────────────────────────
      case 0x01:case 0x11:case 0x21:case 0x31:case 0x41:case 0x51:case 0x61:case 0x71:
      case 0x81:case 0x91:case 0xA1:case 0xB1:case 0xC1:case 0xD1:case 0xE1:case 0xF1: {
        const n=(op>>4),vec=0xFFDE-(n*2);
        this._push((this.PC>>8)&0xFF); this._push(this.PC&0xFF);
        this.PC=(this.rd((vec+1)&0xFFFF)<<8)|this.rd(vec&0xFFFF); cy=8; break; }

      // ── PUSH / POP ────────────────────────────────────────────────────────
      case 0x2D: this._push(this.A); cy=4; break;
      case 0x4D: this._push(this.X); cy=4; break;
      case 0x6D: this._push(this.Y); cy=4; break;
      case 0x0D: this._push(this._getP()); cy=4; break;
      case 0xAE: this.A=this._pop(); cy=4; break;
      case 0xCE: this.X=this._pop(); cy=4; break;
      case 0xEE: this.Y=this._pop(); cy=4; break;
      case 0x8E: this._setP(this._pop()); cy=4; break;

      // ── BIT operations ────────────────────────────────────────────────────
      case 0x02:case 0x22:case 0x42:case 0x62:case 0x82:case 0xA2:case 0xC2:case 0xE2: {
        const bit=(op>>5)&7,a=this._dp(); this.wr(a,this.rd(a)|(1<<bit)); cy=4; break; } // SET1
      case 0x12:case 0x32:case 0x52:case 0x72:case 0x92:case 0xB2:case 0xD2:case 0xF2: {
        const bit=(op>>5)&7,a=this._dp(); this.wr(a,this.rd(a)&~(1<<bit)); cy=4; break; } // CLR1
      case 0xAA: { const ab=this._abs(); this.C=(this.rd(ab>>3)>>(ab&7))&1; cy=4; break; } // MOV1 C,bit
      case 0xCA: { const ab=this._abs(); const b=ab&7,a=ab>>3;
                   this.wr(a,this.C?(this.rd(a)|(1<<b)):(this.rd(a)&~(1<<b))); cy=6; break; } // MOV1 bit,C
      case 0x6A: { const ab=this._abs(); this.C=this.C&((this.rd(ab>>3)>>(ab&7))&1); cy=4; break; } // AND1
      case 0x4A: { const ab=this._abs(); this.C=this.C&(1^((this.rd(ab>>3)>>(ab&7))&1)); cy=4; break; } // AND1 /C
      case 0x0A: { const ab=this._abs(); this.C=this.C|((this.rd(ab>>3)>>(ab&7))&1); cy=4; break; } // OR1
      case 0x2A: { const ab=this._abs(); this.C=this.C|(1^((this.rd(ab>>3)>>(ab&7))&1)); cy=4; break; } // OR1 /C
      case 0x8A: { const ab=this._abs(); this.C=this.C^((this.rd(ab>>3)>>(ab&7))&1); cy=4; break; } // EOR1
      case 0xEA: { const ab=this._abs(); const b=ab&7,a=ab>>3;
                   this.wr(a,this.rd(a)^(1<<b)); cy=5; break; } // NOT1

      // ── Flag ops ──────────────────────────────────────────────────────────
      case 0x60: this.C=0; cy=2; break;  // CLRC
      case 0x80: this.C=1; cy=2; break;  // SETC
      case 0xED: this.C^=1; cy=2; break; // NOTC
      case 0xE0: this.V=0;this.H=0; cy=2; break; // CLRV
      case 0x20: this.P=0; cy=2; break;  // CLRP
      case 0x40: this.P=1; cy=2; break;  // SETP
      case 0xA0: this.I=1; cy=2; break;  // EI
      case 0xC0: this.I=0; cy=2; break;  // DI

      // ── Misc ──────────────────────────────────────────────────────────────
      case 0x00: cy=2; break; // NOP
      case 0xFF: cy=2; break; // STOP (treat as NOP for our purposes)
      case 0xEF: cy=2; break; // SLEEP (treat as NOP)

      default:
        cy=2; break; // Unknown opcode — skip gracefully
    }
    this.cycles += cy;
    return cy;
  }
}

// ── SNES SYSTEM ───────────────────────────────────────────────────────────────
class SNES {
  constructor(cart) {
    this.cart=cart;
    this.bus=new Bus(cart);
    this.cpu=new CPU65816(this.bus);
    this.spc=new SPC700();
    this.ppu=new PPU();
    this.bus.ppu=this.ppu;
    this.bus.cpu=this.cpu;
    this.bus.spc=this.spc;        // wire SPC ports into Bus read/write
    this.ppu.bus=this.bus;
    this.cpu.reset();
    // SPC cycle accumulator — SPC700 runs at ~1.024 MHz vs main ~3.58 MHz
    // For every 8 master clocks (1 slow CPU cycle), SPC gets ~0.381 cycles.
    // We accumulate fractionally and step when >= 1.
    this._spcAcc = 0;
  }

  // ── Memory helpers for Ding achievement engine ───────────────────────────────
  // Read one byte from WRAM. addr is the bare 16-bit WRAM offset (0x0000–0x1FFFF).
  memRead(addr)  { return this.bus.wram[addr & 0x1FFFF]; }
  // Read a little-endian 16-bit word from WRAM.
  memReadU16(addr){ return this.memRead(addr) | (this.memRead(addr+1) << 8); }
  // Build a state snapshot from a memMap: [{key, addr, u16?}]
  // Returns a plain object Ding's evalAchievement() can consume directly.
  memSnapshot(memMap) {
    const s = {};
    for (const { key, addr, u16 } of memMap)
      s[key] = u16 ? this.memReadU16(addr) : this.memRead(addr);
    return s;
  }

  // ── Full diagnostic snapshot (called ~1×/sec from React loop) ────────────────
  diagSnap() {
    const cpu = this.cpu, bus = this.bus, ppu = this.ppu;
    const h2 = v => `$${(v&0xFF).toString(16).toUpperCase().padStart(2,'0')}`;
    const h4 = v => `$${(v&0xFFFF).toString(16).toUpperCase().padStart(4,'0')}`;
    const vecReset = bus.read(0xFFFC) | (bus.read(0xFFFD)<<8);
    const vecNMI   = bus.read(0xFFEA) | (bus.read(0xFFEB)<<8);
    const vecIRQ   = bus.read(0xFFEE) | (bus.read(0xFFEF)<<8);
    const vecBRK   = bus.read(0xFFE6) | (bus.read(0xFFE7)<<8);
    return {
      pc:cpu.PC, pbr:cpu.PBR, a:cpu.A, x:cpu.X, y:cpu.Y,
      sp:cpu.SP, dp:cpu.DP, dbr:cpu.DBR, p:cpu.P, e:cpu.E,
      pendingNMI:cpu.pendingNMI, pendingIRQ:cpu.pendingIRQ,
      stopped:cpu.stopped, waiting:cpu.waiting, cycles:cpu.cycles,
      inidisp:ppu.regs[0x00], obsel:ppu.regs[0x01],
      bgmode:ppu.regs[0x05],  mosaic:ppu.regs[0x06],
      tm:ppu.regs[0x2C],      ts:ppu.regs[0x2D],
      cgwsel:ppu.regs[0x30],  cgadsub:ppu.regs[0x31],
      coldata:ppu.fixedColor,
      vramAddr:ppu.vramAddr, cgramAddr:ppu.cgramAddr, oamAddr:ppu.oamByteAddr,
      scanline:ppu.scanline, frame:ppu.frame, vblank:ppu.vblank,
      nmitimen:bus.nmitimen, nmiFlag:bus.nmiFlag, irqFlag:bus.irqFlag,
      htime:bus.htime, vtime:bus.vtime, memsel:bus.memsel,
      mdmaen:bus.mdmaen, hdmaen:bus.hdmaen,
      apuOut:[...this.bus.apuOut], apuIn:[...this.bus.apuIn],
      apuLog:[...this.bus.apuLog],
      spc: this.spc ? {
        pc:this.spc.PC, a:this.spc.A, x:this.spc.X, y:this.spc.Y,
        sp:this.spc.SP, cycles:this.spc.cycles,
        out:[...this.spc.outPorts], inp:[...this.spc.inPorts],
      } : null,
      vecReset:h4(vecReset), vecNMI:h4(vecNMI), vecIRQ:h4(vecIRQ), vecBRK:h4(vecBRK),
      dma:bus.dmaChannels.map(c=>({
        ctrl:h2(c.ctrl), dest:h2(c.destReg),
        src:`${h2(c.srcBank)}:${h4(c.srcAddr)}`,
        size:c.size, done:c.hdmaFinished,
      })),
      pcHistory:[...cpu.pcHistory],
      bytesAtPC:Array.from({length:8},(_,i)=>bus.read(((cpu.PBR<<16)|((cpu.PC+i)&0xFFFF)))).map(b=>b.toString(16).toUpperCase().padStart(2,'0')),
    };
  }

  runFrame() {
    // ── Per-frame init ───────────────────────────────────────────────────────
    // Initialise HDMA channel table pointers at the top of every frame.
    if (this.bus.hdmaen) this.bus.hdmaInit();

    let lastScanline = this.ppu.scanline;
    let ppuDone      = false;
    let guard        = 0;

    while (!ppuDone && guard++ < 750000) {
      const cyc = this.cpu.step();

      // Master clocks per CPU step.
      // FastROM ($420D bit 0 = 1) → 6 master clocks per CPU cycle.
      // SlowROM (default)          → 8 master clocks per CPU cycle.
      const mc = cyc * (this.bus.memsel & 1 ? 6 : 8);

      // Tick SPC700 proportionally.
      // SPC700 clock = 1,024,000 Hz, master clock = 21,477,272 Hz
      // → SPC cycles per master clock ≈ 1/20.97 ≈ 0.04768
      // → spcAcc += mc * 0.04768; step SPC once per accumulated integer cycle.
      this._spcAcc += mc * 0.04768;
      while (this._spcAcc >= 1) {
        this.spc.step();
        // Keep outPorts alias in sync for diagSnap
        this.bus.apuOut[0] = this.spc.outPorts[0];
        this.bus.apuOut[1] = this.spc.outPorts[1];
        this.bus.apuOut[2] = this.spc.outPorts[2];
        this.bus.apuOut[3] = this.spc.outPorts[3];
        this._spcAcc -= 1;
      }

      ppuDone = this.ppu.advance(mc);

      // ── Scanline-boundary events ─────────────────────────────────────────
      const sl = this.ppu.scanline;
      if (sl !== lastScanline) {
        // HDMA fires at HBlank of each active display scanline
        if (lastScanline < H && this.bus.hdmaen) this.bus.hdmaRun();
        // H/V timer IRQ check (approximate: fires at scanline boundary)
        this.bus.checkIRQ(lastScanline);
        lastScanline = sl;
      }
    }
  }
}

// ── CSS ───────────────────────────────────────────────────────────────────────
const css = `

    --bg:#0a0a0c;--s1:#111118;--s2:#17171f;--s3:#1e1e28;
    --border:#262636;--border2:#323248;
    --purple:#a855f7;--purple-dim:#6b21a8;--purple-glow:rgba(168,85,247,0.15);
    --amber:#f5a623;--text:#e8e8f0;--dim:#9090a8;--muted:#525268;
    --green:#4ade80;--red:#e63946;--teal:#22d3ee;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
  .snes-root{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
  .snes-header{display:flex;align-items:center;gap:1rem;padding:0 2rem;height:56px;background:rgba(10,10,12,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
  .snes-logo{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:3px;color:var(--purple);}
  .snes-logo span{color:var(--text);}
  .snes-badge{background:var(--purple-glow);border:1px solid rgba(168,85,247,0.3);color:var(--purple);font-size:0.65rem;font-family:'JetBrains Mono';letter-spacing:0.1em;padding:2px 8px;border-radius:3px;}
  .snes-game-id{font-size:0.7rem;font-family:'JetBrains Mono';color:var(--teal);opacity:0.8;}
  .snes-spacer{flex:1;}
  .snes-rom-chip{display:flex;align-items:center;gap:0.5rem;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.75rem;font-size:0.75rem;font-family:'JetBrains Mono';color:var(--dim);}
  .snes-rom-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--purple-dim);}
  .snes-rom-chip .dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
  .snes-body{display:flex;gap:1.5rem;padding:1.5rem 2rem;max-width:1140px;margin:0 auto;width:100%;}
  .snes-main{display:flex;flex-direction:column;gap:0.75rem;flex:1;}
  .snes-screen-wrap{position:relative;background:#000;border:2px solid var(--border2);border-radius:4px;overflow:hidden;flex-shrink:0;align-self:flex-start;box-shadow:0 0 0 1px rgba(168,85,247,0.08),0 20px 60px rgba(0,0,0,0.8);}
  .snes-canvas{display:block;image-rendering:pixelated;width:${W*SCALE}px;height:${H*SCALE}px;}
  .snes-canvas-off{width:${W*SCALE}px;height:${H*SCALE}px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;background:radial-gradient(ellipse at center,#1a1428 0%,#0a0a0c 100%);cursor:pointer;}
  .snes-canvas-off:hover{background:radial-gradient(ellipse at center,#1e1632 0%,#0a0a0c 100%);}
  .snes-canvas-off.drag{outline:2px dashed var(--purple);}
  .snes-drop-icon{font-size:2.5rem;opacity:0.55;}
  .snes-drop-title{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:2px;color:var(--dim);}
  .snes-drop-sub{font-size:0.72rem;color:var(--muted);font-family:'JetBrains Mono';}
  .snes-drop-error{color:var(--red);font-size:0.7rem;font-family:'JetBrains Mono';margin-top:0.25rem;}
  .scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}
  /* Scanline sweep — a 2px bar that crawls down the screen in real time */
  .sl-bar{position:absolute;left:0;right:0;height:2px;pointer-events:none;background:rgba(168,85,247,0.35);transition:top 16ms linear;}
  .snes-ctrl-bar{display:flex;align-items:center;gap:0.5rem;}
  .snes-btn{padding:0.4rem 1rem;font-size:0.75rem;font-weight:600;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:var(--s2);color:var(--dim);transition:all 0.15s;letter-spacing:0.04em;font-family:'DM Sans',sans-serif;}
  .snes-btn:hover{background:var(--s3);color:var(--text);}
  .snes-btn.primary{background:var(--purple-glow);border-color:rgba(168,85,247,0.35);color:var(--purple);}
  .snes-btn.primary:hover{background:rgba(168,85,247,0.22);}
  /* FPS — coloured by health */
  .snes-fps{margin-left:auto;font-family:'JetBrains Mono';font-size:0.7rem;display:flex;align-items:center;gap:0.4rem;}
  .fps-val{padding:2px 7px;border-radius:3px;font-weight:600;}
  .fps-good{color:#4ade80;background:rgba(74,222,128,0.1);}
  .fps-warn{color:#f5a623;background:rgba(245,166,35,0.1);}
  .fps-bad {color:#e63946;background:rgba(230,57,70,0.1);}
  .snes-rom-bar{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;font-size:0.72rem;font-family:'JetBrains Mono';color:var(--muted);}
  .map-chip{display:inline-flex;align-items:center;background:var(--purple-glow);border:1px solid rgba(168,85,247,0.2);color:var(--purple);font-size:0.6rem;font-family:'JetBrains Mono';padding:1px 7px;border-radius:3px;}
  .country-chip{display:inline-flex;align-items:center;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);color:var(--teal);font-size:0.6rem;font-family:'JetBrains Mono';padding:1px 7px;border-radius:3px;}
  .snes-sidebar{display:flex;flex-direction:column;gap:0.85rem;width:240px;flex-shrink:0;}
  .snes-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .snes-card-head{display:flex;align-items:center;gap:0.5rem;padding:0.6rem 0.85rem;background:var(--s2);border-bottom:1px solid var(--border);font-size:0.62rem;font-family:'JetBrains Mono';letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
  .snes-card-body{padding:0.75rem 0.85rem;}
  .key-row{display:flex;align-items:center;justify-content:space-between;padding:0.25rem 0;border-bottom:1px solid rgba(255,255,255,0.03);}
  .key-row:last-child{border-bottom:none;}
  .key-action{font-size:0.75rem;color:var(--dim);}
  .key-chips{display:flex;gap:4px;}
  .key-chip{font-family:'JetBrains Mono';font-size:0.6rem;padding:1px 6px;background:var(--s3);border:1px solid var(--border2);border-radius:3px;color:var(--text);}
  .state-row{display:flex;justify-content:space-between;align-items:center;padding:0.22rem 0;border-bottom:1px solid rgba(255,255,255,0.03);}
  .state-row:last-child{border-bottom:none;}
  .state-label{font-size:0.7rem;color:var(--muted);font-family:'JetBrains Mono';}
  .state-val{font-size:0.7rem;color:var(--dim);font-family:'JetBrains Mono';}
  .state-val.hi{color:var(--amber);}
  .state-val.teal{color:var(--teal);}
  .state-val.mode{color:var(--purple);font-size:0.65rem;}
  /* ── Diagnostics panel ── */
  .dbg-wrap{width:100%;max-width:1140px;margin:0 auto 2rem;padding:0 2rem;}
  .dbg-toggle{width:100%;display:flex;align-items:center;gap:0.75rem;padding:0.55rem 1rem;background:var(--s1);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'JetBrains Mono';font-size:0.68rem;letter-spacing:0.1em;color:var(--muted);transition:all 0.15s;text-transform:uppercase;}
  .dbg-toggle:hover{border-color:rgba(168,85,247,0.25);color:var(--text);}
  .dbg-toggle.open{border-radius:8px 8px 0 0;border-bottom-color:transparent;color:var(--purple);}
  .dbg-chevron{margin-left:auto;font-size:0.65rem;transition:transform 0.2s;}
  .dbg-toggle.open .dbg-chevron{transform:rotate(180deg);}
  .dbg-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .dbg-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
  .dbg-panel{background:var(--s1);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;}
  .dbg-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--s2);}
  .dbg-tab{padding:0.45rem 1rem;font-family:'JetBrains Mono';font-size:0.65rem;letter-spacing:0.08em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;user-select:none;}
  .dbg-tab:hover{color:var(--text);}
  .dbg-tab.on{color:var(--amber);border-bottom-color:var(--amber);}
  .dbg-body{padding:1rem 1.25rem;}
  .dbg-reg-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:0.4rem;margin-bottom:0.85rem;}
  .dbg-reg{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:0.45rem 0.6rem;}
  .dbg-reg-name{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--muted);margin-bottom:0.15rem;letter-spacing:0.08em;}
  .dbg-reg-val{font-family:'JetBrains Mono';font-size:0.82rem;color:var(--amber);font-weight:600;}
  .dbg-reg-sub{font-family:'JetBrains Mono';font-size:0.55rem;color:var(--muted);margin-top:0.1rem;}
  .dbg-flags{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:0.85rem;}
  .dbg-flag{padding:0.18rem 0.55rem;border-radius:4px;font-family:'JetBrains Mono';font-size:0.68rem;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:all 0.1s;}
  .dbg-flag.set{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.3);color:var(--purple);}
  .dbg-flag.warn{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.3);color:var(--red);}
  .dbg-flag.ok{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:var(--green);}
  .dbg-io-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-bottom:0.75rem;}
  .dbg-io-row{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:0.32rem 0.55rem;}
  .dbg-io-left{}
  .dbg-io-addr{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--muted);}
  .dbg-io-name{font-family:'JetBrains Mono';font-size:0.6rem;color:var(--dim);}
  .dbg-io-val{font-family:'JetBrains Mono';font-size:0.72rem;color:var(--teal);font-weight:600;}
  .dbg-bits-title{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.3rem;margin-top:0.6rem;}
  .dbg-bits{display:flex;gap:0.3rem;flex-wrap:wrap;}
  .dbg-bit{padding:0.16rem 0.45rem;border-radius:3px;font-family:'JetBrains Mono';font-size:0.6rem;border:1px solid var(--border);background:var(--s2);color:var(--muted);}
  .dbg-bit.set{background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.25);color:var(--teal);}
  .dbg-bit.warn{background:rgba(230,57,70,0.08);border-color:rgba(230,57,70,0.25);color:var(--red);}
  .dbg-int-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-bottom:0.75rem;}
  .dbg-int-cell{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:0.45rem 0.5rem;text-align:center;}
  .dbg-int-name{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--muted);margin-bottom:0.25rem;}
  .dbg-int-chips{display:flex;gap:0.25rem;justify-content:center;}
  .dbg-int-chip{padding:0.12rem 0.35rem;border-radius:3px;font-family:'JetBrains Mono';font-size:0.58rem;font-weight:600;background:var(--s3);color:var(--muted);border:1px solid var(--border);}
  .dbg-int-chip.en{background:rgba(74,222,128,0.08);color:var(--green);border-color:rgba(74,222,128,0.25);}
  .dbg-int-chip.pend{background:rgba(245,166,35,0.1);color:var(--amber);border-color:rgba(245,166,35,0.25);}
  .dbg-dma-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;}
  .dbg-dma-cell{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:0.45rem 0.6rem;}
  .dbg-dma-ch{font-family:'JetBrains Mono';font-size:0.58rem;color:var(--muted);margin-bottom:0.2rem;}
  .dbg-dma-val{font-family:'JetBrains Mono';font-size:0.65rem;color:var(--dim);line-height:1.5;}
  .dbg-log{background:#06060a;border:1px solid var(--border);border-radius:5px;padding:0.6rem 0.8rem;height:200px;overflow-y:auto;font-family:'JetBrains Mono';font-size:0.67rem;display:flex;flex-direction:column;gap:0.22rem;}
  .dbg-log::-webkit-scrollbar{width:4px;}
  .dbg-log::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
  .dbg-log-row{display:flex;gap:0.65rem;line-height:1.45;}
  .dbg-log-ts{color:var(--muted);flex-shrink:0;}
  .dbg-log-tag{flex-shrink:0;padding:0 0.3rem;border-radius:3px;font-size:0.58rem;}
  .dbg-log-tag.cpu{background:rgba(245,166,35,0.1);color:var(--amber);}
  .dbg-log-tag.ppu{background:rgba(34,211,238,0.08);color:var(--teal);}
  .dbg-log-tag.irq{background:rgba(230,57,70,0.1);color:var(--red);}
  .dbg-log-tag.dma{background:rgba(168,85,247,0.1);color:var(--purple);}
  .dbg-log-msg{color:var(--dim);}
`;

// ── REACT COMPONENT ───────────────────────────────────────────────────────────
// Props (all optional — works standalone or embedded in Ding):
//   romUrl        string   — fetch & auto-load a ROM from URL on mount
//   gameId        string   — Ding game identifier (displayed in header)
//   memMap        array    — [{key,addr,u16?}] mapped to Ding memory addresses
//   onStateUpdate function — called every frame with {cpu, ppu, mem} snapshot
function SNESEmulator({ romUrl, gameId, memMap, onStateUpdate } = {}) {
  const canvasRef   = useRef(null);
  const snesRef     = useRef(null);
  const rafRef      = useRef(null);
  const fileRef     = useRef(null);
  const fpsCountRef = useRef({ frames:0, last:0, times:[], frameCount:0 });
  const buttonsRef  = useRef(0);
  const lastFrameTs = useRef(0);

  const [running, setRunning] = useState(false);
  const [paused,  setPaused]  = useState(false);
  const [drag,    setDrag]    = useState(false);
  const [error,   setError]   = useState(null);
  const [fps,     setFps]     = useState(0);
  const [romInfo, setRomInfo] = useState(null);
  const [cpuInfo, setCpuInfo] = useState(null);
  const [ppuInfo, setPpuInfo] = useState(null);
  const [frameCount, setFrameCount] = useState(0);
  const [dbgOpen,  setDbgOpen]  = useState(false);
  const [dbgTab,   setDbgTab]   = useState('cpu');
  const [dbgSnap,  setDbgSnap]  = useState(null);
  const [eventLog, setEventLog] = useState([]);
  const eventLogRef  = useRef([]);
  const prevDiagRef  = useRef({});
  const lastDiagTs   = useRef(0);

  useEffect(() => {
    const dn = e => { const b=KEY_MAP[e.key]; if(b!==undefined){buttonsRef.current|=(1<<b);e.preventDefault();} };
    const up = e => { const b=KEY_MAP[e.key]; if(b!==undefined) buttonsRef.current&=~(1<<b); };
    window.addEventListener("keydown",dn); window.addEventListener("keyup",up);
    return () => { window.removeEventListener("keydown",dn); window.removeEventListener("keyup",up); };
  }, []);

  const pushEvent = (tag, msg) => {
    const ts = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const entry = { ts, tag, msg, id: Date.now()+Math.random() };
    eventLogRef.current = [entry, ...eventLogRef.current].slice(0, 120);
    setEventLog([...eventLogRef.current]);
  };

  const loop = useCallback((ts) => {
    if (!snesRef.current) return;

    // ── Smooth FPS: rolling average over last 60 timestamps ─────────────────
    const fc = fpsCountRef.current;
    fc.times.push(ts);
    if (fc.times.length > 60) fc.times.shift();
    if (fc.times.length >= 2) {
      const span = fc.times[fc.times.length-1] - fc.times[0];
      const smoothFps = Math.round((fc.times.length-1) / (span/1000));
      if (Math.abs(smoothFps - fps) >= 1) setFps(smoothFps);
    }

    if (!paused) {
      // ── 60 fps throttle: skip if we're called more than ~2ms early ────────
      const target = lastFrameTs.current + 14; // ~16.7ms between frames
      if (ts < target) { rafRef.current = requestAnimationFrame(loop); return; }
      lastFrameTs.current = ts;

      // ── Run one emulated frame ─────────────────────────────────────────────
      snesRef.current.bus.joypad[0] = buttonsRef.current;
      snesRef.current.runFrame();

      // ── Blit pixel buffer to canvas ────────────────────────────────────────
      const canvas = canvasRef.current;
      if (canvas) {
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(W, H);
        new Uint32Array(img.data.buffer).set(snesRef.current.ppu.pixels);
        ctx.putImageData(img, 0, 0);
      }

      // ── Collect snapshots ──────────────────────────────────────────────────
      const cpu = snesRef.current.cpu.snapshot();
      const ppu = snesRef.current.ppu.ppuSnapshot();
      setCpuInfo(cpu);
      setPpuInfo(ppu);
      setFrameCount(ppu.frame);

      // ── Diagnostic snap + event log (~1×/sec) ─────────────────────────────
      if (ts - lastDiagTs.current >= 1000) {
        lastDiagTs.current = ts;
        const snap = snesRef.current.diagSnap();
        setDbgSnap(snap);
        const prev = prevDiagRef.current;
        // Change detection → event log
        if (prev.inidisp !== undefined) {
          const wasBlank = !!(prev.inidisp & 0x80), isBlank = !!(snap.inidisp & 0x80);
          if (wasBlank !== isBlank)
            pushEvent('ppu', `INIDISP: screen ${isBlank ? 'forced BLANK' : 'ENABLED'} (brightness ${snap.inidisp & 0xF})`);
          if (prev.inidisp !== snap.inidisp)
            pushEvent('ppu', `INIDISP $${prev.inidisp.toString(16).toUpperCase().padStart(2,'0')} → $${snap.inidisp.toString(16).toUpperCase().padStart(2,'0')} (blank:${isBlank?1:0} bright:${snap.inidisp&0xF})`);
        }
        if (prev.bgmode !== undefined && prev.bgmode !== snap.bgmode)
          pushEvent('ppu', `BGMODE → $${snap.bgmode.toString(16).toUpperCase()} (Mode ${snap.bgmode & 7})`);
        if (prev.tm !== undefined && prev.tm !== snap.tm)
          pushEvent('ppu', `TM (main layers) → $${snap.tm.toString(16).toUpperCase().padStart(2,'0')}`);
        if (prev.nmitimen !== undefined && prev.nmitimen !== snap.nmitimen)
          pushEvent('irq', `NMITIMEN → $${snap.nmitimen.toString(16).toUpperCase().padStart(2,'0')} (NMI:${snap.nmitimen>>7} IRQ:${(snap.nmitimen>>4)&3})`);
        if (prev.e !== undefined && prev.e !== snap.e)
          pushEvent('cpu', `CPU mode → ${snap.e ? 'Emulation' : 'Native (65816)'}`);
        if (prev.stopped !== undefined && snap.stopped && !prev.stopped)
          pushEvent('cpu', 'CPU STP — halted until reset');
        if (prev.waiting !== undefined && snap.waiting && !prev.waiting)
          pushEvent('cpu', 'CPU WAI — waiting for interrupt');
        if (prev.waiting !== undefined && !snap.waiting && prev.waiting)
          pushEvent('cpu', 'CPU WAI released');
        if (prev.apuOut !== undefined) {
          for (let i = 0; i < 4; i++) {
            if (prev.apuOut[i] !== snap.apuOut[i])
              pushEvent('cpu', `APU port $214${i} out: $${prev.apuOut[i].toString(16).toUpperCase().padStart(2,'0')} → $${snap.apuOut[i].toString(16).toUpperCase().padStart(2,'0')}`);
            if (prev.apuIn[i] !== snap.apuIn[i])
              pushEvent('cpu', `APU port $214${i} in:  $${prev.apuIn[i].toString(16).toUpperCase().padStart(2,'0')} → $${snap.apuIn[i].toString(16).toUpperCase().padStart(2,'0')}`);
          }
        }
        if (prev.hdmaen !== undefined && prev.hdmaen !== snap.hdmaen)
          pushEvent('dma', `HDMA enable → $${snap.hdmaen.toString(16).toUpperCase().padStart(2,'0')}`);
        if (prev.pendingNMI !== undefined && snap.pendingNMI && !prev.pendingNMI)
          pushEvent('irq', `NMI fired → vector ${snap.vecNMI}`);
        if (prev.pendingIRQ !== undefined && snap.pendingIRQ && !prev.pendingIRQ)
          pushEvent('irq', `IRQ fired → vector ${snap.vecIRQ}`);
        prevDiagRef.current = snap;
      }

      // ── Ding integration: fire onStateUpdate every frame ──────────────────
      if (onStateUpdate) {
        const mem = memMap ? snesRef.current.memSnapshot(memMap) : {};
        onStateUpdate({ cpu, ppu, mem });
      }
    }
    rafRef.current = requestAnimationFrame(loop);
  }, [paused, fps, onStateUpdate, memMap]);

  useEffect(() => {
    if (running) rafRef.current=requestAnimationFrame(loop);
    return () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [running, loop]);

  // Auto-load from URL prop (for Ding embedding)
  useEffect(() => {
    if (!romUrl) return;
    fetch(romUrl)
      .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.arrayBuffer(); })
      .then(buf => loadROM(new File([buf], romUrl.split('/').pop()||'rom.sfc')))
      .catch(e => setError(`romUrl: ${e.message}`));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [romUrl]);

  const loadROM = useCallback((file) => {
    if (!file) return;
    const ext=file.name.split('.').pop().toLowerCase();
    if (!['sfc','smc','fig'].includes(ext)) { setError(`Unsupported: .${ext} — need .sfc or .smc`); return; }
    const reader=new FileReader();
    reader.onload=(e) => {
      try {
        const data=new Uint8Array(e.target.result);
        const cart=new Cartridge(data);
        const snes=new SNES(cart);
        snesRef.current=snes;
        setRomInfo({ title:cart.title, map:cart.mapLabel,
          romKB:Math.round(cart.rom.length/1024), ramKB:cart.sram.length>0?Math.round(cart.sram.length/1024):0,
          version:cart.version, country:cart.country });
        setError(null); setRunning(true); setPaused(false);
      } catch(err) { setError(err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const onFile  = e  => loadROM(e.target.files[0]);
  const onDrop  = e  => { e.preventDefault(); setDrag(false); loadROM(e.dataTransfer.files[0]); };
  const onReset = () => snesRef.current?.cpu.reset();
  const onEject = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    snesRef.current=null;
    setRunning(false); setPaused(false); setRomInfo(null); setCpuInfo(null); setPpuInfo(null); setFrameCount(0); setDbgSnap(null); setEventLog([]); setError(null); setFps(0);
    eventLogRef.current=[]; prevDiagRef.current={};
  };

  // Country code → human name for ROM bar
  const COUNTRIES = ['Japan','USA','Europe','Sweden','Finland','Denmark','France','Netherlands',
                     'Spain','Germany','Italy','China','Indonesia','South Korea','Canada','Brazil',
                     'Australia','New Zealand','Spain','Portugal','UK','Other'];
  const fpsClass = fps >= 58 ? 'fps-good' : fps >= 45 ? 'fps-warn' : 'fps-bad';
  const MODE_NAMES = ['0 (4BG 2bpp)','1 (2×4bpp+2bpp)','2 (offset-per-tile)',
                      '3 (8bpp+4bpp)','4 (8bpp+2bpp)','5 (hi-res)','6 (offset+hi)','7 (affine)'];
  const slPct = ppuInfo ? (ppuInfo.scanline / SCANLINES) * 100 : 0;

  return (
    <div className="snes-root">
      <style>{css}</style>

      {/* ── Header ── */}
      <header className="snes-header">
        <div className="snes-logo">D!ng<span>SNES</span></div>
        <div className="snes-badge">Work In Progress</div>
        {gameId && <div className="snes-game-id">#{gameId}</div>}
        <div className="snes-spacer"/>
        <div className="snes-rom-chip">
          <div className={`dot${running?' on':''}`}/>
          {romInfo ? romInfo.title : 'No ROM loaded'}
        </div>
      </header>

      <div className="snes-body">
        <div className="snes-main">

          {/* ── Screen ── */}
          <div className="snes-screen-wrap">
            {running ? (
              <>
                <canvas ref={canvasRef} className="snes-canvas" width={W} height={H}/>
                <div className="scanlines"/>
                {/* Scanline sweep bar — shows current PPU raster position */}
                {ppuInfo && !ppuInfo.vblank && (
                  <div className="sl-bar" style={{top:`${slPct}%`}}/>
                )}
              </>
            ) : (
              <div
                className={`snes-canvas-off${drag?' drag':''}`}
                onClick={() => fileRef.current?.click()}
                onDragOver={e=>{e.preventDefault();setDrag(true);}}
                onDragLeave={()=>setDrag(false)}
                onDrop={onDrop}
              >
                <div className="snes-drop-icon">🎮</div>
                <div className="snes-drop-title">Drop a ROM</div>
                <div className="snes-drop-sub">.sfc · .smc · .fig · LoROM / HiROM / ExHiROM</div>
                {error && <div className="snes-drop-error">⚠ {error}</div>}
              </div>
            )}
          </div>

          {/* ── Controls bar ── */}
          {running && (
            <div className="snes-ctrl-bar">
              <button className="snes-btn primary" onClick={()=>setPaused(p=>!p)}>
                {paused?'▶ Resume':'⏸ Pause'}
              </button>
              <button className="snes-btn" onClick={onReset}>↺ Reset</button>
              <button className="snes-btn" onClick={onEject}>⏏ Eject</button>
              <div className="snes-fps">
                <span className={`fps-val ${fpsClass}`}>{fps} FPS</span>
                <span style={{color:'var(--muted)'}}>f#{frameCount.toLocaleString()}</span>
              </div>
            </div>
          )}

          {/* ── ROM info bar ── */}
          {running && romInfo && (
            <div className="snes-rom-bar">
              <span className="map-chip">{romInfo.map}</span>
              {romInfo.country !== undefined &&
                <span className="country-chip">{COUNTRIES[romInfo.country] ?? `$${romInfo.country.toString(16).toUpperCase()}`}</span>}
              <span>{romInfo.title}</span>
              <span>·</span>
              <span>{romInfo.romKB}KB ROM</span>
              {romInfo.ramKB>0&&<><span>·</span><span>{romInfo.ramKB}KB SRAM</span></>}
              <span>·</span>
              <span>v{romInfo.version}</span>
            </div>
          )}

          <input ref={fileRef} type="file" accept=".sfc,.smc,.fig" style={{display:'none'}} onChange={onFile}/>
        </div>

        {/* ── Sidebar ── */}
        <div className="snes-sidebar">

          {/* Controls */}
          <div className="snes-card">
            <div className="snes-card-head">⌨ Controls</div>
            <div className="snes-card-body">
              {KEYS_DISPLAY.map(k=>(
                <div className="key-row" key={k.action}>
                  <span className="key-action">{k.action}</span>
                  <span className="key-chips">{k.chips.map(c=><span key={c} className="key-chip">{c}</span>)}</span>
                </div>
              ))}
            </div>
          </div>

          {/* CPU State */}
          {cpuInfo && (
            <div className="snes-card">
              <div className="snes-card-head">🔬 CPU State</div>
              <div className="snes-card-body">
                {[
                  ['PBR:PC',`$${cpuInfo.pbr.toString(16).padStart(2,'0').toUpperCase()}:${cpuInfo.pc.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['A', `$${cpuInfo.a.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['X', `$${cpuInfo.x.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['Y', `$${cpuInfo.y.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['SP',`$${cpuInfo.sp.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['DP',`$${cpuInfo.dp.toString(16).padStart(4,'0').toUpperCase()}`],
                  ['DBR',`$${cpuInfo.dbr.toString(16).padStart(2,'0').toUpperCase()}`],
                ].map(([l,v])=>(
                  <div className="state-row" key={l}>
                    <span className="state-label">{l}</span>
                    <span className={`state-val${l==='PBR:PC'?' hi':''}`}>{v}</span>
                  </div>
                ))}
                <div className="state-row">
                  <span className="state-label">NV·MXDIZC</span>
                  <span className="state-val" style={{letterSpacing:'0.12em',color:'var(--purple)'}}>
                    {[7,6,5,4,3,2,1,0].map(b=>(
                      <span key={b} style={{opacity:(cpuInfo.p>>b)&1?1:0.25}}>{(cpuInfo.p>>b)&1}</span>
                    ))}
                  </span>
                </div>
                <div className="state-row">
                  <span className="state-label">Mode</span>
                  <span className="state-val mode">{cpuInfo.e?'Emulation':'Native'}</span>
                </div>
                <div className="state-row">
                  <span className="state-label">Cycles</span>
                  <span className="state-val">{cpuInfo.cycles.toLocaleString()}</span>
                </div>
              </div>
            </div>
          )}

          {/* Live PPU Stats */}
          {ppuInfo && (
            <div className="snes-card">
              <div className="snes-card-head">📺 PPU State</div>
              <div className="snes-card-body">
                {[
                  ['Frame',   frameCount.toLocaleString()],
                  ['Scanline',`${ppuInfo.scanline} / ${SCANLINES}`],
                  ['VBlank',  ppuInfo.vblank ? 'yes' : 'no'],
                  ['BG Mode', MODE_NAMES[ppuInfo.mode] ?? ppuInfo.mode],
                  ['TM',      `$${ppuInfo.tm.toString(16).toUpperCase().padStart(2,'0')}`],
                  ['Bright',  `${ppuInfo.inidisp & 0x0F}/15${ppuInfo.inidisp&0x80?' (blank)':''}`],
                ].map(([l,v])=>(
                  <div className="state-row" key={l}>
                    <span className="state-label">{l}</span>
                    <span className={`state-val${l==='BG Mode'?' teal':''}`}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      </div>

      {/* ── Diagnostics Panel ── */}
      <div className="dbg-wrap">
        <button className={`dbg-toggle${dbgOpen?' open':''}`} onClick={()=>setDbgOpen(o=>!o)}>
          <div className={`dbg-dot${running?' live':''}`}/>
          🔧 Diagnostics
          {dbgSnap && (
            <span style={{fontFamily:"'JetBrains Mono'",fontSize:'0.62rem',color:'var(--dim)',marginLeft:'0.5rem',letterSpacing:'0.04em'}}>
              {`$${dbgSnap.pbr.toString(16).padStart(2,'0').toUpperCase()}:${dbgSnap.pc.toString(16).padStart(4,'0').toUpperCase()}`}
              {' · '}INIDISP:{`$${dbgSnap.inidisp.toString(16).padStart(2,'0').toUpperCase()}`}
              {' · '}SL:{dbgSnap.scanline}
              {' · '}NMI:{(dbgSnap.nmitimen>>7)&1} IRQ:{(dbgSnap.nmitimen>>4)&3}
            </span>
          )}
          <span className="dbg-chevron">▼</span>
        </button>

        {dbgOpen && (
          <div className="dbg-panel">
            <div className="dbg-tabs">
              {[['cpu','CPU'],['ppu','PPU / IO'],['irq','INTERRUPTS'],['dma','DMA'],['apu','APU LOG'],['log','EVENT LOG']].map(([id,label])=>(
                <div key={id} className={`dbg-tab${dbgTab===id?' on':''}`} onClick={()=>setDbgTab(id)}>{label}</div>
              ))}
            </div>

            <div className="dbg-body">
              {!dbgSnap && (
                <div style={{color:'var(--muted)',fontFamily:"'JetBrains Mono'",fontSize:'0.72rem',padding:'1rem 0'}}>
                  Load a ROM to see diagnostics.
                </div>
              )}

              {/* ── CPU tab ── */}
              {dbgSnap && dbgTab==='cpu' && (()=>{
                const h2=v=>`$${(v&0xFF).toString(16).toUpperCase().padStart(2,'0')}`;
                const h4=v=>`$${(v&0xFFFF).toString(16).toUpperCase().padStart(4,'0')}`;
                const FLAGS=[['N',7],['V',6],['M',5],['X',4],['D',3],['I',2],['Z',1],['C',0]];
                return (<>
                  <div className="dbg-reg-grid">
                    {[
                      ['PBR:PC', `$${dbgSnap.pbr.toString(16).padStart(2,'0').toUpperCase()}:${dbgSnap.pc.toString(16).padStart(4,'0').toUpperCase()}`, 'program counter'],
                      ['A',  h4(dbgSnap.a),  `${dbgSnap.a}`],
                      ['X',  h4(dbgSnap.x),  `${dbgSnap.x}`],
                      ['Y',  h4(dbgSnap.y),  `${dbgSnap.y}`],
                      ['SP', h4(dbgSnap.sp), 'stack ptr'],
                      ['DP', h4(dbgSnap.dp), 'direct pg'],
                      ['DBR',h2(dbgSnap.dbr),'data bank'],
                      ['P',  h2(dbgSnap.p),  'status'],
                      ['Mode',dbgSnap.e?'Emul':'Native','E flag'],
                      ['Cycles',dbgSnap.cycles.toLocaleString(),'total'],
                      ['WAI', dbgSnap.waiting?'YES':'no', 'waiting'],
                      ['STP', dbgSnap.stopped?'YES':'no', 'stopped'],
                    ].map(([n,v,s])=>(
                      <div className="dbg-reg" key={n}>
                        <div className="dbg-reg-name">{n}</div>
                        <div className="dbg-reg-val" style={n==='WAI'&&dbgSnap.waiting||n==='STP'&&dbgSnap.stopped?{color:'var(--red)'}:{}}>{v}</div>
                        <div className="dbg-reg-sub">{s}</div>
                      </div>
                    ))}
                  </div>
                  <div className="dbg-bits-title">STATUS FLAGS  (P = {h2(dbgSnap.p)})</div>
                  <div className="dbg-flags">
                    {FLAGS.map(([name,bit])=>(
                      <div key={name} className={`dbg-flag${(dbgSnap.p>>bit)&1?' set':''}`}>{name} {(dbgSnap.p>>bit)&1}</div>
                    ))}
                    <div className={`dbg-flag${dbgSnap.pendingNMI?' pend':''}`} style={dbgSnap.pendingNMI?{background:'rgba(245,166,35,0.1)',borderColor:'rgba(245,166,35,0.3)',color:'var(--amber)'}:{}}>NMI {dbgSnap.pendingNMI?'⚡':'-'}</div>
                    <div className={`dbg-flag${dbgSnap.pendingIRQ?' pend':''}`} style={dbgSnap.pendingIRQ?{background:'rgba(245,166,35,0.1)',borderColor:'rgba(245,166,35,0.3)',color:'var(--amber)'}:{}}>IRQ {dbgSnap.pendingIRQ?'⚡':'-'}</div>
                  </div>
                  <div className="dbg-bits-title">BYTES AT PC — {`$${dbgSnap.pbr.toString(16).padStart(2,'0').toUpperCase()}:${dbgSnap.pc.toString(16).padStart(4,'0').toUpperCase()}`}</div>
                  <div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:'5px',padding:'0.45rem 0.75rem',fontFamily:"'JetBrains Mono'",fontSize:'0.75rem',color:'var(--teal)',letterSpacing:'0.12em'}}>
                    {dbgSnap.bytesAtPC ? dbgSnap.bytesAtPC.join(' ') : '—'}
                  </div>
                  <div className="dbg-bits-title">PC TRACE — last 24 unique addresses (newest first)</div>
                  <div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:'5px',padding:'0.5rem 0.75rem',fontFamily:"'JetBrains Mono'",fontSize:'0.63rem',lineHeight:'1.8',color:'var(--dim)'}}>
                    {dbgSnap.pcHistory && dbgSnap.pcHistory.length > 0
                      ? [...dbgSnap.pcHistory].reverse().map((addr,i)=>{
                          const bank=(addr>>16)&0xFF, pc=addr&0xFFFF;
                          const label=`$${bank.toString(16).padStart(2,'0').toUpperCase()}:${pc.toString(16).padStart(4,'0').toUpperCase()}`;
                          return <span key={i} style={{marginRight:'0.85rem',color:i===0?'var(--amber)':'var(--dim)'}}>{label}</span>;
                        })
                      : <span style={{color:'var(--muted)',fontStyle:'italic'}}>No trace yet</span>
                    }
                  </div>
                </>);
              })()}

              {/* ── PPU / IO tab ── */}
              {dbgSnap && dbgTab==='ppu' && (()=>{
                const h2=v=>`$${(v&0xFF).toString(16).toUpperCase().padStart(2,'0')}`;
                const INIDISP_BITS=[[7,'Forced blank (BIT 7)'],[3,'Bright b3'],[2,'Bright b2'],[1,'Bright b1'],[0,'Bright b0']];
                const TM_BITS=[[4,'OBJ'],[3,'BG4'],[2,'BG3'],[1,'BG2'],[0,'BG1']];
                const BGMODE_BITS=[[7,'BG4 16px'],[6,'BG3 16px'],[5,'BG2 16px'],[4,'BG1 16px'],[2,'M b2'],[1,'M b1'],[0,'M b0']];
                return (<>
                  <div className="dbg-io-grid">
                    {[
                      ['$2100','INIDISP', h2(dbgSnap.inidisp)],
                      ['$2101','OBSEL',   h2(dbgSnap.obsel)],
                      ['$2105','BGMODE',  h2(dbgSnap.bgmode)],
                      ['$2106','MOSAIC',  h2(dbgSnap.mosaic)],
                      ['$212C','TM',      h2(dbgSnap.tm)],
                      ['$212D','TS',      h2(dbgSnap.ts)],
                      ['$2130','CGWSEL',  h2(dbgSnap.cgwsel)],
                      ['$2131','CGADSUB', h2(dbgSnap.cgadsub)],
                      ['VRAM', 'addr',    `$${dbgSnap.vramAddr.toString(16).toUpperCase().padStart(4,'0')}`],
                      ['CGRAM','addr',    `$${dbgSnap.cgramAddr.toString(16).toUpperCase().padStart(2,'0')}`],
                      ['OAM',  'addr',    `$${dbgSnap.oamAddr.toString(16).toUpperCase().padStart(3,'0')}`],
                      ['Frame','',        `${dbgSnap.frame}`],
                    ].map(([addr,name,val])=>(
                      <div className="dbg-io-row" key={addr}>
                        <div className="dbg-io-left">
                          <div className="dbg-io-addr">{addr}</div>
                          <div className="dbg-io-name">{name}</div>
                        </div>
                        <div className="dbg-io-val">{val}</div>
                      </div>
                    ))}
                  </div>
                  <div className="dbg-bits-title">INIDISP BITS{(dbgSnap.inidisp&0x80)?' ⚠ FORCED BLANK':''}</div>
                  <div className="dbg-bits">
                    {INIDISP_BITS.map(([bit,label])=>(
                      <div key={bit} className={`dbg-bit${(dbgSnap.inidisp>>bit)&1?(bit===7?' warn':' set'):''}`}>{label}</div>
                    ))}
                  </div>
                  <div className="dbg-bits-title">TM — MAIN SCREEN LAYERS</div>
                  <div className="dbg-bits">
                    {TM_BITS.map(([bit,label])=>(
                      <div key={bit} className={`dbg-bit${(dbgSnap.tm>>bit)&1?' set':''}`}>{label}</div>
                    ))}
                  </div>
                  <div className="dbg-bits-title">BGMODE BITS</div>
                  <div className="dbg-bits">
                    {BGMODE_BITS.map(([bit,label])=>(
                      <div key={bit} className={`dbg-bit${(dbgSnap.bgmode>>bit)&1?' set':''}`}>{label}</div>
                    ))}
                  </div>
                </>);
              })()}

              {/* ── INTERRUPTS tab ── */}
              {dbgSnap && dbgTab==='irq' && (()=>{
                const h2=v=>`$${(v&0xFF).toString(16).toUpperCase().padStart(2,'0')}`;
                const NMITIMEN_BITS=[[7,'NMI en'],[6,'Auto-joy'],[5,'H-IRQ'],[4,'V-IRQ']];
                return (<>
                  <div className="dbg-int-grid">
                    {[
                      {name:'NMI',   en:!!(dbgSnap.nmitimen&0x80), pend:dbgSnap.pendingNMI,  flag:!!(dbgSnap.nmiFlag&0x80), vec:dbgSnap.vecNMI},
                      {name:'IRQ',   en:!!((dbgSnap.nmitimen>>4)&3), pend:dbgSnap.pendingIRQ, flag:!!(dbgSnap.irqFlag&0x80), vec:dbgSnap.vecIRQ},
                      {name:'RESET', en:true, pend:false, flag:false, vec:dbgSnap.vecReset},
                      {name:'BRK',   en:true, pend:false, flag:false, vec:dbgSnap.vecBRK},
                    ].map(({name,en,pend,flag,vec})=>(
                      <div className="dbg-int-cell" key={name}>
                        <div className="dbg-int-name">{name}</div>
                        <div className="dbg-int-chips">
                          <div className={`dbg-int-chip${en?' en':''}`}>EN:{en?1:0}</div>
                          <div className={`dbg-int-chip${pend?' pend':''}`}>PEND:{pend?1:0}</div>
                          <div className={`dbg-int-chip${flag?' pend':''}`}>FLAG:{flag?1:0}</div>
                        </div>
                        <div style={{fontFamily:"'JetBrains Mono'",fontSize:'0.58rem',color:'var(--muted)',marginTop:'0.3rem'}}>{vec}</div>
                      </div>
                    ))}
                  </div>
                  <div className="dbg-io-grid">
                    {[
                      ['$4200','NMITIMEN',h2(dbgSnap.nmitimen)],
                      ['$4210','RDNMI',   h2(dbgSnap.nmiFlag)],
                      ['$4211','TIMEUP',  h2(dbgSnap.irqFlag)],
                      ['$420D','MEMSEL',  h2(dbgSnap.memsel)],
                      ['HTIME','H timer', `${dbgSnap.htime}`],
                      ['VTIME','V timer', `${dbgSnap.vtime}`],
                      ['IRQ mode',((dbgSnap.nmitimen>>4)&3)===0?'OFF':((dbgSnap.nmitimen>>4)&3)===1?'H':((dbgSnap.nmitimen>>4)&3)===2?'V':'H+V',''],
                      ['CPU ROM',dbgSnap.memsel&1?'FastROM':'SlowROM','$420D'],
                      ['APU OUT','$2140–3', dbgSnap.apuOut ? dbgSnap.apuOut.map(b=>`$${b.toString(16).toUpperCase().padStart(2,'0')}`).join(' ') : '—'],
                      ['APU IN', '$2140–3', dbgSnap.apuIn  ? dbgSnap.apuIn.map(b=>`$${b.toString(16).toUpperCase().padStart(2,'0')}`).join(' ')  : '—'],
                    ].map(([addr,name,val])=>(
                      <div className="dbg-io-row" key={addr}>
                        <div className="dbg-io-left">
                          <div className="dbg-io-addr">{addr}</div>
                          <div className="dbg-io-name">{name}</div>
                        </div>
                        <div className="dbg-io-val">{val}</div>
                      </div>
                    ))}
                  </div>
                  <div className="dbg-bits-title">NMITIMEN BITS</div>
                  <div className="dbg-bits">
                    {NMITIMEN_BITS.map(([bit,label])=>(
                      <div key={bit} className={`dbg-bit${(dbgSnap.nmitimen>>bit)&1?' set':''}`}>{label}</div>
                    ))}
                  </div>
                </>);
              })()}

              {/* ── DMA tab ── */}
              {dbgSnap && dbgTab==='dma' && (<>
                <div style={{fontFamily:"'JetBrains Mono'",fontSize:'0.65rem',color:'var(--dim)',marginBottom:'0.75rem'}}>
                  GDMA active: <span style={{color:dbgSnap.mdmaen?'var(--amber)':'var(--muted)'}}>{dbgSnap.mdmaen?`$${dbgSnap.mdmaen.toString(16).toUpperCase().padStart(2,'0')}`:'none'}</span>
                  <span style={{marginLeft:'1.5rem'}}>HDMA enabled: <span style={{color:dbgSnap.hdmaen?'var(--teal)':'var(--muted)'}}>{dbgSnap.hdmaen?`$${dbgSnap.hdmaen.toString(16).toUpperCase().padStart(2,'0')}`:'none'}</span></span>
                </div>
                <div className="dbg-dma-grid">
                  {dbgSnap.dma.map((c,i)=>{
                    const active=(dbgSnap.hdmaen>>(i))&1;
                    return (
                      <div className="dbg-dma-cell" key={i} style={active?{borderColor:'rgba(34,211,238,0.3)'}:{}}>
                        <div className="dbg-dma-ch" style={active?{color:'var(--teal)'}:{}}>CH {i}{active?' ·HDMA':''}</div>
                        <div className="dbg-dma-val">
                          ctrl {c.ctrl}<br/>
                          dest {c.dest}<br/>
                          src {c.src}<br/>
                          {c.size>0?`size ${c.size}`:'size —'}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>)}

              {/* ── APU Log tab ── */}
              {dbgTab==='apu' && (
                <div>
                  <div style={{fontFamily:"'JetBrains Mono'",fontSize:'0.62rem',color:'var(--dim)',marginBottom:'0.6rem'}}>
                    Last {dbgSnap?.apuLog?.length??0} APU port accesses (newest last) — R=read by CPU, W=written by CPU
                  </div>
                  <div className="dbg-log" style={{height:'240px'}}>
                    {(!dbgSnap?.apuLog || dbgSnap.apuLog.length===0) && (
                      <div style={{color:'var(--muted)',fontStyle:'italic'}}>No APU accesses yet</div>
                    )}
                    {dbgSnap?.apuLog?.map((e,i)=>{
                      const isRead = e.dir==='R';
                      const portColor = ['var(--amber)','var(--teal)','var(--green)','var(--purple)'][e.port];
                      return (
                        <div className="dbg-log-row" key={i}>
                          <span style={{fontFamily:"'JetBrains Mono'",fontSize:'0.62rem',
                            color:isRead?'var(--teal)':'var(--amber)',
                            background:isRead?'rgba(34,211,238,0.08)':'rgba(245,166,35,0.08)',
                            padding:'0 0.3rem',borderRadius:'3px',flexShrink:0}}>
                            {e.dir}
                          </span>
                          <span style={{color:'var(--muted)',fontSize:'0.62rem',flexShrink:0}}>
                            $214{e.port}
                          </span>
                          <span style={{color:portColor,fontSize:'0.68rem',fontWeight:600,flexShrink:0}}>
                            ${e.val.toString(16).toUpperCase().padStart(2,'0')}
                          </span>
                          <span style={{color:'var(--muted)',fontSize:'0.6rem'}}>
                            A=${e.a.toString(16).toUpperCase().padStart(4,'0')}
                            {e.rep > 1 && <span style={{color:'var(--muted)',marginLeft:'0.4rem'}}>×{e.rep.toLocaleString()}</span>}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{fontFamily:"'JetBrains Mono'",fontSize:'0.6rem',color:'var(--muted)',marginTop:'0.5rem'}}>
                    APU OUT: {dbgSnap?.apuOut?.map((b,i)=><span key={i} style={{marginRight:'0.5rem',color:'var(--teal)'}}>P{i}=${b.toString(16).toUpperCase().padStart(2,'0')}</span>)}
                    &nbsp;·&nbsp;
                    APU IN: {dbgSnap?.apuIn?.map((b,i)=><span key={i} style={{marginRight:'0.5rem',color:'var(--amber)'}}>P{i}=${b.toString(16).toUpperCase().padStart(2,'0')}</span>)}
                  </div>
                  {dbgSnap?.spc && (
                    <div style={{fontFamily:"'JetBrains Mono'",fontSize:'0.6rem',color:'var(--muted)',marginTop:'0.3rem'}}>
                      SPC700 — PC:${dbgSnap.spc.pc.toString(16).toUpperCase().padStart(4,'0')}
                      &nbsp;A:${dbgSnap.spc.a.toString(16).toUpperCase().padStart(2,'0')}
                      &nbsp;X:${dbgSnap.spc.x.toString(16).toUpperCase().padStart(2,'0')}
                      &nbsp;Y:${dbgSnap.spc.y.toString(16).toUpperCase().padStart(2,'0')}
                      &nbsp;SP:${dbgSnap.spc.sp.toString(16).toUpperCase().padStart(2,'0')}
                      &nbsp;cycles:{dbgSnap.spc.cycles.toLocaleString()}
                    </div>
                  )}
                </div>
              )}

              {/* ── Event Log tab ── */}
              {dbgTab==='log' && (
                <div className="dbg-log">
                  {eventLog.length===0 && (
                    <div style={{color:'var(--muted)',fontStyle:'italic'}}>Events will appear here as the game runs...</div>
                  )}
                  {eventLog.map(e=>(
                    <div className="dbg-log-row" key={e.id}>
                      <span className="dbg-log-ts">{e.ts}</span>
                      <span className={`dbg-log-tag ${e.tag}`}>{e.tag.toUpperCase()}</span>
                      <span className="dbg-log-msg">{e.msg}</span>
                    </div>
                  ))}
                </div>
              )}

            </div>
          </div>
        )}
      </div>

    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SNESEmulator />);
  </script>
</body>
</html>
